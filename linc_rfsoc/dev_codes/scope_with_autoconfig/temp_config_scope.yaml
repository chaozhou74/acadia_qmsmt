q_stimulus:
  channel: "DAC1"
  nco_config:
    vop: 30000
    mix_reconstruction: False
    nco_frequency: 40e6
  waveforms:
    q_rotation:
      length: 40.0e-9
      fixed_length: 200.0e-9
  signals:
    pi_pulse:
      data: ["scipy", "hann"]
      scale: 0.282
    pi_2_pulse:
      data: ["scipy", "hann"]
      scale: 0.141

ro_stimulus:
  channel: "DAC4"
  nco_config:
    vop: 25000
    mix_reconstruction: False
    nco_frequency: 60e6
  waveforms:
    ro_drive:
      length: 40.e-9
      fixed_length: 0.6e-6
  signals:
    readout:
      data: ["scipy", "hann"]
      scale: (0.5, -50deg)

ro_capture:
  channel: "ADC0"
  nco_config:
    nco_frequency: -9.030e9
  waveforms:
    ro_demod:
      length: 2.4e-6
      decimation: 0
      region: "plddr"
  capture_delay: 300e-9
  kernel_wf: 0.1
  cmacc_offset: 0
