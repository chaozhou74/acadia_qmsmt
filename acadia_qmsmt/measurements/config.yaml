qb_stimulus:
  channel: DAC0 # DAC1 # for scope check
  channel_config:
    vop: 30000 # Gain of the DAC
    mix_reconstruction: true # flase # for scope check # Set to falso for zero order hold (ZOH) reconstruction
    nco_frequency: 8.097711962e+9 # 50e6 # for scope check
  pulses:
    R_x_180:
      data: hann
      scale: 0.68918
      ramp: 120e-9 # Both up and down ramps
      flat: 100e-9
      use_stretch: true
    R_x_180_selective:
      data: hann
      scale: 0.05228
      ramp: 400e-9
      flat: 5e-6
      use_stretch: true
    R_x_90:
      data: hann
      scale: 0.32665
      ramp: 120e-9
      flat: 100e-9
      use_stretch: true
    R_x_180_selective_ef:
      data: hann
      scale: 0.04036
      ramp: 400e-9
      flat: 5e-6
      detune: -1.56597379e+8
      use_stretch: false
    R_x_180_ef:
      data: hann
      scale: 0.38864
      ramp: 400e-9
      detune: -1.56597379e+8
      use_stretch: false


ro_stimulus:
  channel: DAC2
  channel_config:
    vop: 25000
    mix_reconstruction: true # true
    nco_frequency: 9.0008e+9      # 8.9985e9 # 9.00057e9 # 20e6 # 8.9995e9 # 9.0004e9
  pulses:
    readout:
      data: hann
      scale: (0.35, 0deg)
      ramp: 120e-9
      flat: 1e-6
      use_stretch: true


ro_capture:
  channel: ADC0
  channel_config:
    nco_frequency: 9.0008e+9      # 8.9985e9 # 9.00057e9 # 9.0004e9
  memories:
    readout_trace:
      length: 2.2e-6
      decimation: 4
      region: plddr
    readout_accumulated:
      length: 2.2e-6
      decimation: 0
      region: plddr
    readout_accumulated_alt_1:
      length: 2.5e-6
      decimation: 0
      region: plddr
    readout_accumulated_alt_2:
      length: 2.5e-6
      decimation: 0
      region: plddr
    readout_trace_long:
      length: 31e-6
      decimation: 4
      region: plddr
  capture_delay: 320e-9
  windows:
    boxcar:
      data: 0.1
      offset: [0, 0]
    matched:
      data: 0.1
      offset: [131, 1545]

  
qb_alice_bs_stimulus:
  channel: DAC6 # DAC7 for scope check, DAC6 for normal operation
  channel_config:
    vop: 30000
    mix_reconstruction: false
    nco_frequency: 2.64131e9 # 20e6 # for scope check
  pulses:
    swap:
      data: hann
      scale: 0.036
      ramp: 120e-9
      flat: 100e-9
      use_stretch: true
    bs_50_50:
      data: hann
      scale: 0.036
      ramp: 120e-9
      flat: 100e-9
      use_stretch: true
    dChi_pump:
      data: hann
      scale: 0.1
      ramp: 120e-9
      flat: 100e-9
      use_stretch: true
    dChi_parity_map:
      data: hann
      scale: 0.1
      ramp: 120e-9
      flat: 100e-9
      use_stretch: true
